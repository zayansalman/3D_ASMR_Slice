<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ASMR Slice — Satisfying Stress Relief</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a1a2e;font-family:'Segoe UI',system-ui,sans-serif;touch-action:none;-webkit-user-select:none;user-select:none;color:#e0e0ff}
canvas{display:block}

/* ── Screens ── */
.screen{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .3s}
.screen.hidden{opacity:0;pointer-events:none}

/* Title */
#screen-title{background:radial-gradient(ellipse at 50% 40%,#2a2a4e 0%,#1a1a2e 70%)}
#screen-title h1{font-size:clamp(36px,8vw,56px);font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
#screen-title .sub{color:#8888bb;font-size:14px;margin-bottom:32px}
.btn-main{padding:14px 48px;border:none;border-radius:28px;background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;font-size:18px;font-weight:700;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 24px rgba(124,58,237,.35);transition:transform .15s}
.btn-main:active{transform:scale(.95)}
#total-stars-title{margin-top:20px;color:#fbbf24;font-size:16px}

/* Level Select */
#screen-levels{background:#1a1a2e;padding:20px;overflow-y:auto}
#screen-levels h2{font-size:22px;margin-bottom:12px}
.world-tabs{display:flex;gap:6px;margin-bottom:16px}
.wtab{padding:8px 20px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(255,255,255,.04);color:#aaa;font-size:13px;cursor:pointer;transition:all .2s}
.wtab.active{background:rgba(124,58,237,.25);border-color:rgba(124,58,237,.5);color:#fff}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:360px;width:100%}
.lvl-btn{width:100%;aspect-ratio:1;border:2px solid rgba(255,255,255,.08);border-radius:14px;background:rgba(255,255,255,.03);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative}
.lvl-btn:active{transform:scale(.92)}
.lvl-btn.locked{opacity:.35;cursor:default}
.lvl-btn.locked::after{content:'🔒';position:absolute;font-size:16px}
.lvl-btn .lvl-num{font-size:18px;font-weight:700;color:#ddd}
.lvl-btn.locked .lvl-num{visibility:hidden}
.lvl-btn .lvl-stars{font-size:11px;margin-top:2px;color:#fbbf24;letter-spacing:1px}
#btn-back{margin-top:18px;padding:8px 20px;border:1px solid rgba(255,255,255,.1);border-radius:14px;background:transparent;color:#888;font-size:13px;cursor:pointer}
#stars-total-levels{color:#fbbf24;font-size:14px;margin-top:10px}
#shop-btn{margin-top:10px;padding:8px 20px;border:1px solid rgba(251,191,36,.2);border-radius:14px;background:rgba(251,191,36,.06);color:#fbbf24;font-size:13px;cursor:pointer}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:15;pointer-events:none;padding:10px 16px}
#hud.hidden{display:none}
#hud-top{display:flex;justify-content:space-between;align-items:center}
#hud-level{font-size:14px;color:#aab}
#hud-score{font-size:22px;font-weight:700;color:#fff}
#hud-combo{font-size:18px;font-weight:700;color:#fbbf24;opacity:0;transition:opacity .15s}
#hud-combo.show{opacity:1}
#hud-timer{font-size:16px;color:#f87171;font-weight:600}
#sat-bar{margin-top:8px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
#sat-fill{height:100%;width:0%;background:linear-gradient(90deg,#34d399,#fbbf24,#f97316);border-radius:3px;transition:width .25s}
#pause-btn{position:fixed;top:12px;right:12px;z-index:16;width:36px;height:36px;border:none;border-radius:50%;background:rgba(255,255,255,.08);color:#aaa;font-size:16px;cursor:pointer;pointer-events:auto}

/* Level Complete */
#screen-complete{background:rgba(10,10,25,.92);backdrop-filter:blur(8px)}
#screen-complete h2{font-size:28px;font-weight:700;margin-bottom:16px}
.stars-row{display:flex;gap:12px;margin-bottom:20px}
.star-icon{font-size:42px;color:#444;transition:color .3s,transform .3s}
.star-icon.earned{color:#fbbf24;transform:scale(1.15)}
.score-breakdown{text-align:left;font-size:14px;color:#999;line-height:2}
.score-breakdown span{color:#fff;font-weight:600;float:right}
.complete-btns{display:flex;gap:10px;margin-top:20px}
.btn-sec{padding:10px 28px;border:1px solid rgba(255,255,255,.12);border-radius:20px;background:rgba(255,255,255,.05);color:#ccc;font-size:14px;cursor:pointer}
#ad-slot{margin-top:20px;width:300px;height:50px;border:1px dashed rgba(255,255,255,.08);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#555;font-size:11px}

/* Pause / Fail */
#screen-pause,#screen-fail{background:rgba(10,10,25,.88);backdrop-filter:blur(6px)}
#screen-fail h2{color:#f87171}

/* Shop */
#screen-shop{background:#1a1a2e;padding:20px;overflow-y:auto}
.shop-section{margin-bottom:24px;width:100%;max-width:360px}
.shop-section h3{font-size:15px;color:#aab;margin-bottom:8px}
.shop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.shop-item{aspect-ratio:1;border:2px solid rgba(255,255,255,.08);border-radius:12px;background:rgba(255,255,255,.03);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:11px;color:#888;gap:4px}
.shop-item.unlocked{border-color:rgba(124,58,237,.3)}
.shop-item.selected{border-color:#7c3aed;background:rgba(124,58,237,.12)}
.shop-item.locked{opacity:.4;cursor:default}
.shop-item .item-icon{font-size:24px}
.shop-item .item-cost{color:#fbbf24;font-size:10px}

/* Combo float */
.combo-float{position:fixed;pointer-events:none;z-index:30;font-size:24px;font-weight:800;color:#fbbf24;text-shadow:0 2px 8px rgba(251,191,36,.4);animation:floatUp .8s ease-out forwards}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-70px) scale(1.2);opacity:0}}
@keyframes starPop{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.3) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
.star-icon.anim{animation:starPop .4s ease-out forwards}
</style>
</head>

<!-- ═══ TITLE SCREEN ═══ -->

<div id="screen-pause" class="screen hidden">

    <button class="btn-sec" id="btn-fail-quit">Menu</button>

  </div>
</div>

<!-- ═══ SHOP ═══ -->
<div id="screen-shop" class="screen hidden">

</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════════════
//  AUDIO — port of Scripts/chopSound.cs
// ═══════════════════════════════════════════════════════════════
const AC=window.AudioContext||window.webkitAudioContext;let actx;
function ea(){if(!actx)actx=new AC();if(actx.state==='suspended')actx.resume()}

function playChop(){
  ea();const t=actx.currentTime+0.1;
  const b=actx.createBuffer(1,actx.sampleRate*.12,actx.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.12));
  const s=actx.createBufferSource();s.buffer=b;
  const hp=actx.createBiquadFilter();hp.type='highpass';hp.frequency.value=900;
  const g=actx.createGain();g.gain.setValueAtTime(.45,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);
  s.connect(hp).connect(g).connect(actx.destination);s.start(t);s.stop(t+.15);
}
function playSquish(){
  ea();const t=actx.currentTime;
  const o=actx.createOscillator();o.type='sine';o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(55,t+.18);
  const g=actx.createGain();g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);
  o.connect(g).connect(actx.destination);o.start(t);o.stop(t+.25);
}
function playJelly(){
  ea();const t=actx.currentTime;
  const o=actx.createOscillator();o.type='sine';o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(100,t+.35);
  const g=actx.createGain();g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);
  const lfo=actx.createOscillator();lfo.frequency.value=14;const lg=actx.createGain();lg.gain.value=35;
  lfo.connect(lg).connect(o.frequency);o.connect(g).connect(actx.destination);lfo.start(t);o.start(t);lfo.stop(t+.45);o.stop(t+.45);
}
function playDing(){
  ea();const t=actx.currentTime;
  const o=actx.createOscillator();o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(1200,t+.15);
  const g=actx.createGain();g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);
  o.connect(g).connect(actx.destination);o.start(t);o.stop(t+.4);
}
function playFail(){
  ea();const t=actx.currentTime;
  const o=actx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(100,t+.4);
  const g=actx.createGain();g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);
  o.connect(g).connect(actx.destination);o.start(t);o.stop(t+.55);
}

// ═══════════════════════════════════════════════════════════════
//  THREE.JS SCENE
// ═══════════════════════════════════════════════════════════════
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a1a2e);
scene.fog=new THREE.Fog(0x1a1a2e,12,24);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,100);
camera.position.set(0,3.5,7);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=.07;controls.maxPolarAngle=Math.PI/2.05;
controls.minDistance=3;controls.maxDistance=14;

scene.add(new THREE.AmbientLight(0x6666aa,.5));
const sun=new THREE.DirectionalLight(0xffeedd,1.2);sun.position.set(4,8,5);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);scene.add(sun);
const fill=new THREE.PointLight(0x8888ff,.5,16);fill.position.set(-4,3,-3);scene.add(fill);

const ground=new THREE.Mesh(new THREE.PlaneGeometry(24,24),new THREE.MeshStandardMaterial({color:0x22223a,roughness:.9}));
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);

// ═══════════════════════════════════════════════════════════════
//  PHYSICS: MeshDeformer — port of Scripts/MeshDeformer.cs
//  springForce=20 (line 17), damping=5 (line 19)
// ═══════════════════════════════════════════════════════════════
class MeshDeformer{
  constructor(mesh){
    this.mesh=mesh;const pos=mesh.geometry.attributes.position;const c=pos.count;
    this.orig=new Float32Array(pos.array);this.disp=new Float32Array(pos.array);
    this.vel=new Float32Array(c*3);this.sf=20;this.damp=5;
  }
  addForce(wp,force){
    const lp=this.mesh.worldToLocal(wp.clone());const n=this.disp.length/3;
    for(let i=0;i<n;i++)this._fv(i,lp,force);
  }
  _fv(i,pt,force){
    const ix=i*3,iy=ix+1,iz=ix+2;
    const px=this.disp[ix]-pt.x,py=this.disp[iy]-pt.y,pz=this.disp[iz]-pt.z;
    const sq=px*px+py*py+pz*pz;const af=force/(1+sq);const dt=this._dt||.016;const v=af*dt;
    const m=Math.sqrt(sq)||1;
    this.vel[ix]+=(px/m)*v;this.vel[iy]+=(py/m)*v;this.vel[iz]+=(pz/m)*v;
  }
  update(dt){
    this._dt=dt;const n=this.disp.length/3;
    for(let i=0;i<n;i++){
      const ix=i*3,iy=ix+1,iz=ix+2;
      let vx=this.vel[ix],vy=this.vel[iy],vz=this.vel[iz];
      const dx=this.disp[ix]-this.orig[ix],dy=this.disp[iy]-this.orig[iy],dz=this.disp[iz]-this.orig[iz];
      vx-=dx*this.sf*dt;vy-=dy*this.sf*dt;vz-=dz*this.sf*dt;
      const df=Math.max(0,Math.min(1,1-this.damp*dt));
      vx*=df;vy*=df;vz*=df;
      this.vel[ix]=vx;this.vel[iy]=vy;this.vel[iz]=vz;
      this.disp[ix]+=vx*dt;this.disp[iy]+=vy*dt;this.disp[iz]+=vz*dt;
    }
    this.mesh.geometry.attributes.position.array.set(this.disp);
    this.mesh.geometry.attributes.position.needsUpdate=true;
    this.mesh.geometry.computeVertexNormals();
  }
}

// ═══════════════════════════════════════════════════════════════
//  PHYSICS: Jelly — port of Scripts/Jelly.cs
//  intensity=1 (line 8), mass=1 (line 9), stifness=1 (line 10), damping=0.75 (line 11)
// ═══════════════════════════════════════════════════════════════
class JellyVertex{
  constructor(id,pos){this.ID=id;this.position=pos.clone();this.velocity=new THREE.Vector3();this.force=new THREE.Vector3()}
  Shake(target,m,s,d){
    this.force.copy(target).sub(this.position).multiplyScalar(s);
    this.velocity.add(this.force.clone().divideScalar(m)).multiplyScalar(d);
    this.position.add(this.velocity);
    if(this.velocity.clone().add(this.force).add(this.force.clone().divideScalar(m)).length()<.001)this.position.copy(target);
  }
}
class JellySystem{
  constructor(mesh){
    this.mesh=mesh;this.intensity=1;this.mass=1;this.stifness=1;this.damping=.75;
    const pos=mesh.geometry.attributes.position;this.orig=new Float32Array(pos.array);
    this.jv=[];
    for(let i=0;i<pos.count;i++){
      const wp=new THREE.Vector3(pos.getX(i),pos.getY(i),pos.getZ(i));mesh.localToWorld(wp);
      this.jv.push(new JellyVertex(i,wp));
    }
  }
  poke(wp,str){
    for(const j of this.jv){const d=j.position.distanceTo(wp);const k=str/(1+d*d*4);
      j.velocity.add(j.position.clone().sub(wp).normalize().multiplyScalar(k));}
  }
  update(){
    const pos=this.mesh.geometry.attributes.position;
    for(let i=0;i<this.jv.length;i++){
      const j=this.jv[i];const ox=this.orig[j.ID*3],oy=this.orig[j.ID*3+1],oz=this.orig[j.ID*3+2];
      const t=new THREE.Vector3(ox,oy,oz);this.mesh.localToWorld(t);
      j.Shake(t,this.mass,this.stifness,this.damping);
      const l=this.mesh.worldToLocal(j.position.clone());
      pos.setXYZ(j.ID,ox+(l.x-ox)*this.intensity,oy+(l.y-oy)*this.intensity,oz+(l.z-oz)*this.intensity);
    }
    pos.needsUpdate=true;this.mesh.geometry.computeVertexNormals();
  }
}

//  SCORING & COMBOS
// ═══════════════════════════════════════════════════════════════
const BASE_SLICE=100,BASE_SQUISH=50,BASE_POKE=30;
const COMBO_WINDOW=1.5;

function registerAction(type,screenX,screenY){
  const now=performance.now()/1000;
  const base=type==='slice'?BASE_SLICE:type==='squish'?BASE_SQUISH:BASE_POKE;
  if(now-lastActionTime<COMBO_WINDOW){combo++}else{combo=1}
  lastActionTime=now;
  const pts=base*combo;
  score+=pts;baseScore+=base;comboBonus+=(pts-base);
  actionsDone++;

  // HUD updates
  document.getElementById('hud-score').textContent=score;
  const ce=document.getElementById('hud-combo');
  if(combo>1){ce.textContent='x'+combo;ce.classList.add('show')}else{ce.classList.remove('show')}
  const pct=Math.min(100,actionsDone/curLevelDef.target*100);
  document.getElementById('sat-fill').style.width=pct+'%';

  showComboFloat('+'+pts+(combo>1?' x'+combo:''),screenX||innerWidth/2,screenY||innerHeight/3);
  if(navigator.vibrate)navigator.vibrate(combo>3?[30,20,30]:30);
  shakeAmt=Math.min(.15,combo*.03);

  if(actionsDone>=curLevelDef.target)completeLevel();
}

function showComboFloat(text,x,y){
  const el=document.createElement('div');el.className='combo-float';el.textContent=text;
  el.style.left=x+'px';el.style.top=y+'px';document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

function completeLevel(){
  if(state!=='playing')return;
  timerActive=false;
  if(curLevelDef.time)timeBonus=Math.round(timer)*10;
  score+=timeBonus;

  // Slow-mo on completion
  timeScale=.2;setTimeout(()=>{timeScale=1;showComplete()},400);
}

function showComplete(){
  state='complete';
  const st=curLevelDef.stars;
  const earned=score>=st[2]?3:score>=st[1]?2:score>=st[0]?1:0;
  const prev=save.stars[curLevel]||0;
  if(earned>prev)save.stars[curLevel]=earned;
  if(!save.scores[curLevel]||score>save.scores[curLevel])save.scores[curLevel]=score;
  writeSave();

  document.getElementById('complete-title').textContent=
    earned===3?'Perfect!':earned===2?'Great Job!':'Level Complete!';
  const sr=document.getElementById('stars-row');sr.innerHTML='';
  for(let i=0;i<3;i++){
    const s=document.createElement('span');s.className='star-icon'+(i<earned?' earned':'');
    s.textContent=i<earned?'★':'☆';sr.appendChild(s);
    if(i<earned)setTimeout(()=>{s.classList.add('anim');playDing()},300+i*350);
  }
  const bd=document.getElementById('score-breakdown');
  bd.innerHTML=`<div>Base <span>${baseScore}</span></div>`+
    `<div>Combo bonus <span>${comboBonus}</span></div>`+
    (timeBonus?`<div>Time bonus <span>${timeBonus}</span></div>`:'')+
    `<div style="margin-top:6px;font-size:16px;color:#fff">Total <span>${score}</span></div>`;
  const nb=document.getElementById('btn-next');
  nb.style.display=curLevel<30?'':'none';
  showScreen('screen-complete');
}

// ═══════════════════════════════════════════════════════════════
//  OBJECT SPAWNING
// ═══════════════════════════════════════════════════════════════
function clearScene(){
  [...interactables].forEach(o=>scene.remove(o));interactables.length=0;
  [...fallingPieces].forEach(p=>scene.remove(p.mesh));fallingPieces.length=0;
  [...particles].forEach(p=>scene.remove(p.pts));particles.length=0;
  if(knife){scene.remove(knife);knife=null}
  deformers.length=0;jellies.length=0;
}

function randomBoardPos(i,total){
  const cols=Math.min(total,5);const row=Math.floor(i/cols);const col=i%cols;
  const sx=-1.5+(col/(cols-1||1))*3;const sz=-0.8+(row*0.9);
  return new THREE.Vector3(sx+(Math.random()-.5)*.3,.5+Math.random()*.15,sz+(Math.random()-.5)*.2);
}

function spawnSliceObjs(lvl){
  let idx=0,total=0;for(const o of lvl.objs)total+=o.n;
  for(const o of lvl.objs){
    const def=OBJ[o.t];
    for(let i=0;i<o.n;i++){
      const geo=def.geo();
      const mat=new THREE.MeshStandardMaterial({color:def.color,roughness:.5,metalness:.05});
      const mesh=new THREE.Mesh(geo,mat);mesh.position.copy(randomBoardPos(idx,total));
      mesh.castShadow=true;
      mesh.userData={type:'sliceable',tag:def.tag,insideColor:def.inside,sliced:false};
      scene.add(mesh);interactables.push(mesh);idx++;
    }
  }
}

function spawnSquishObjs(lvl){
  let idx=0;
  for(const o of lvl.objs){
    for(let i=0;i<o.n;i++){
      const sz=o.s||1;const ci=o.c===-1?i%SQCOL.length:o.c;
      const geo=new THREE.SphereGeometry(sz,48,48);
      const mat=new THREE.MeshStandardMaterial({color:SQCOL[ci],roughness:.35,metalness:.05});
      const mesh=new THREE.Mesh(geo,mat);
      const spread=o.n>1?2.2:0;
      mesh.position.set((idx-o.n/2+.5)*spread*0.6,sz+.2,0);
      mesh.castShadow=true;mesh.userData={type:'squishable'};
      scene.add(mesh);interactables.push(mesh);
      deformers.push(new MeshDeformer(mesh));idx++;
    }
  }
}

function spawnJellyObjs(lvl){
  let idx=0;
  for(const o of lvl.objs){
    for(let i=0;i<o.n;i++){
      const sz=o.s||1;const ci=o.c===-1?i%JLCOL.length:o.c;
      const geo=new THREE.BoxGeometry(sz*1.4,sz*1.4,sz*1.4,10,10,10);
      const mat=new THREE.MeshPhysicalMaterial({color:JLCOL[ci],roughness:.15,metalness:.05,transmission:.35,thickness:1,clearcoat:.5});
      const mesh=new THREE.Mesh(geo,mat);
      const spread=o.n>1?1.8:0;
      mesh.position.set((idx-o.n/2+.5)*spread*0.6,sz*.7+.2,0);
      mesh.castShadow=true;mesh.userData={type:'jelly'};
      scene.add(mesh);interactables.push(mesh);
      jellies.push(new JellySystem(mesh));idx++;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  KNIFE FACTORY — port of Scripts/TouchControl2.cs
// ═══════════════════════════════════════════════════════════════
const speedModSide=.006,speedModDown=.006;
function createKnife(){
  const g=new THREE.Group();
  const skin=save.knife||'default';
  let bladeW=.04,bladeH=1.2,bladeD=.5,bladeCol=0xcccccc,bladeE=null,handleCol=0x5c3a1e;
  if(skin==='cleaver'){bladeW=.06;bladeH=.9;bladeD=.7;bladeCol=0xaaaaaa;handleCol=0x3a2010}
  else if(skin==='katana'){bladeW=.03;bladeH=1.5;bladeD=.35;bladeCol=0xddddee;handleCol=0x1a1a1a}
  else if(skin==='laser'){bladeW=.02;bladeH=1.3;bladeD=.4;bladeCol=0x00ffff;bladeE=0x00ffff;handleCol=0x333333}
  const bm=new THREE.MeshStandardMaterial({color:bladeCol,metalness:.8,roughness:.2});
  if(bladeE)bm.emissive=new THREE.Color(bladeE);if(bladeE)bm.emissiveIntensity=.6;
  const blade=new THREE.Mesh(new THREE.BoxGeometry(bladeW,bladeH,bladeD),bm);
  blade.position.y=bladeH/2;blade.castShadow=true;g.add(blade);
  const handle=new THREE.Mesh(new THREE.BoxGeometry(.08,.45,.12),new THREE.MeshStandardMaterial({color:handleCol,roughness:.7}));
  handle.position.y=bladeH+.22;g.add(handle);
  g.position.set(0,1.8,0);g.rotation.z=Math.PI;
  scene.add(g);return g;
}

// ═══════════════════════════════════════════════════════════════
//  SLICER — port of Scripts/Slicer.cs
// ═══════════════════════════════════════════════════════════════
function makeItPhysical(mesh){
  fallingPieces.push({mesh,vel:new THREE.Vector3((Math.random()-.5)*1.8,1.5+Math.random()*2,(Math.random()-.5)*1.8),
    rotVel:new THREE.Vector3(Math.random()*5,Math.random()*3,Math.random()*5),settled:false});
}
function createHull(geo,dir){
  const c=geo.clone();const pos=c.attributes.position;
  for(let i=0;i<pos.count;i++){const y=pos.getY(i);
    if(dir>0&&y<0)pos.setY(i,0);else if(dir<0&&y>0)pos.setY(i,0);}
  pos.needsUpdate=true;c.computeVertexNormals();return c;
}
function sliceObject(obj,sx,sy){
  if(obj.userData.sliced)return;obj.userData.sliced=true;
  playChop();registerAction('slice',sx,sy);
  const op=obj.position.clone();const geo=obj.geometry;const oc=obj.material.color.getHex();
  const ic=obj.userData.insideColor;const tag=obj.userData.tag;
  scene.remove(obj);const idx=interactables.indexOf(obj);if(idx>-1)interactables.splice(idx,1);
  for(const dir of[1,-1]){
    const hg=createHull(geo,dir);
    const hm=new THREE.MeshStandardMaterial({color:dir>0?oc:ic,roughness:.45});
    const h=new THREE.Mesh(hg,hm);h.position.copy(op);h.castShadow=true;
    h.userData={type:'sliceable',tag,insideColor:ic,sliced:false};
    scene.add(h);interactables.push(h);makeItPhysical(h);
  }
  spawnParticles(op,oc);
}

function spawnParticles(pos,color){
  const n=16+combo*4;const geo=new THREE.BufferGeometry();
  const arr=new Float32Array(n*3);const vels=[];
  for(let i=0;i<n;i++){arr[i*3]=pos.x;arr[i*3+1]=pos.y;arr[i*3+2]=pos.z;
    vels.push(new THREE.Vector3((Math.random()-.5)*3,Math.random()*3+1,(Math.random()-.5)*3))}
  geo.setAttribute('position',new THREE.BufferAttribute(arr,3));
  const mat=new THREE.PointsMaterial({color,size:.07,transparent:true,opacity:1});
  const pts=new THREE.Points(geo,mat);scene.add(pts);particles.push({pts,vels,life:1});
}

// ═══════════════════════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════════════════════
function startLevel(id){
  ea();curLevel=id;curLevelDef=LEVELS[id-1];
  actionsDone=0;score=0;baseScore=0;comboBonus=0;timeBonus=0;combo=0;lastActionTime=0;
  timer=curLevelDef.time||0;timerActive=!!curLevelDef.time;timeScale=1;
  clearScene();applyBg();
  if(curLevelDef.world==='slice'){knife=createKnife();spawnSliceObjs(curLevelDef);camera.position.set(0,4,6)}
  else if(curLevelDef.world==='squish'){spawnSquishObjs(curLevelDef);camera.position.set(0,2.5,5)}
  else{spawnJellyObjs(curLevelDef);camera.position.set(0,2.5,5)}
  controls.target.set(0,.8,0);

  document.getElementById('hud-level').textContent=`Level ${id}: ${curLevelDef.title}`;
  document.getElementById('hud-score').textContent='0';
  document.getElementById('hud-combo').classList.remove('show');
  document.getElementById('sat-fill').style.width='0%';
  const te=document.getElementById('hud-timer');
  te.style.display=curLevelDef.time?'':'none';
  if(curLevelDef.time)te.textContent=curLevelDef.time+'s';

  state='playing';showScreen(null);
}

// ═══════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════
let pDown=false,lastPX=0,lastPY=0,rDrag=false;

function gp(e){
  const x=e.clientX??e.touches?.[0]?.clientX;const y=e.clientY??e.touches?.[0]?.clientY;
  if(x==null)return null;pointer.x=(x/innerWidth)*2-1;pointer.y=-(y/innerHeight)*2+1;return{x,y};
}

function onDown(e){
  ea();if(state!=='playing')return;
  rDrag=(e.button===2);const p=gp(e);if(!p)return;
  pDown=true;lastPX=p.x;lastPY=p.y;
  if(rDrag)return;

  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(interactables);
  if(!hits.length)return;const hit=hits[0];const obj=hit.object;

  if(curLevelDef.world==='slice'&&obj.userData.type==='sliceable'){
    controls.enabled=false;sliceObject(obj,p.x,p.y);setTimeout(()=>controls.enabled=true,120);
  }else if(curLevelDef.world==='squish'&&obj.userData.type==='squishable'){
    controls.enabled=false;
    const pt=hit.point.clone().add(hit.face.normal.clone().multiplyScalar(.1));
    const def=deformers.find(d=>d.mesh===obj);if(def)def.addForce(pt,10);
    playSquish();registerAction('squish',p.x,p.y);
    setTimeout(()=>controls.enabled=true,50);
  }else if(curLevelDef.world==='jelly'){
    controls.enabled=false;
    const js=jellies.find(j=>j.mesh===obj);if(js){js.poke(hit.point,.5);playJelly();registerAction('poke',p.x,p.y)}
    setTimeout(()=>controls.enabled=true,120);
  }
}

function onMove(e){
  if(!pDown||state!=='playing')return;const p=gp(e);if(!p)return;
  const dx=p.x-lastPX,dy=p.y-lastPY;lastPX=p.x;lastPY=p.y;

  if(curLevelDef.world==='slice'&&knife&&!rDrag){
    knife.position.x+=dx*speedModSide*80;knife.position.y-=dy*speedModDown*80;
    raycaster.setFromCamera(pointer,camera);
    for(const h of raycaster.intersectObjects(interactables)){
      if(h.object.userData.type==='sliceable'&&!h.object.userData.sliced)sliceObject(h.object,p.x,p.y);
    }
  }
  if(curLevelDef.world==='squish'){
    raycaster.setFromCamera(pointer,camera);
    const hits=raycaster.intersectObjects(interactables);
    if(hits.length&&hits[0].object.userData.type==='squishable'){
      const pt=hits[0].point.clone().add(hits[0].face.normal.clone().multiplyScalar(.1));
      const def=deformers.find(d=>d.mesh===hits[0].object);if(def)def.addForce(pt,8);
    }
  }
  if(curLevelDef.world==='slice'&&knife&&rDrag)knife.rotation.y+=dx*speedModSide*40;
}

function onUp(){pDown=false;controls.enabled=true}

renderer.domElement.addEventListener('pointerdown',onDown);
renderer.domElement.addEventListener('pointermove',onMove);
renderer.domElement.addEventListener('pointerup',onUp);
renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
renderer.domElement.addEventListener('touchstart',e=>{ea();if(e.touches.length===1)onDown(e.touches[0])},{passive:true});
renderer.domElement.addEventListener('touchmove',e=>{if(e.touches.length>=1)onMove(e.touches[0])},{passive:true});
renderer.domElement.addEventListener('touchend',onUp);

// ═══════════════════════════════════════════════════════════════
document.getElementById('btn-play').addEventListener('click',()=>{
  state='levels';buildWorldTabs();buildLevelSelect('slice');updateStarDisplays();showScreen('screen-levels');
});
document.getElementById('btn-back').addEventListener('click',()=>{state='title';updateStarDisplays();showScreen('screen-title')});
document.getElementById('pause-btn').addEventListener('click',()=>{if(state==='playing'){state='paused';showScreen('screen-pause')}});
document.getElementById('btn-resume').addEventListener('click',()=>{state='playing';showScreen(null)});
document.getElementById('btn-quit').addEventListener('click',()=>{state='levels';clearScene();buildLevelSelect(curLevelDef.world);updateStarDisplays();showScreen('screen-levels')});
document.getElementById('btn-retry').addEventListener('click',()=>startLevel(curLevel));
document.getElementById('btn-next').addEventListener('click',()=>{if(curLevel<30)startLevel(curLevel+1)});
document.getElementById('btn-fail-retry').addEventListener('click',()=>startLevel(curLevel));
document.getElementById('btn-fail-quit').addEventListener('click',()=>{state='levels';clearScene();buildLevelSelect(curLevelDef.world);updateStarDisplays();showScreen('screen-levels')});
document.getElementById('shop-btn').addEventListener('click',()=>{state='shop';buildShop();showScreen('screen-shop')});
document.getElementById('btn-shop-back').addEventListener('click',()=>{state='levels';showScreen('screen-levels')});

// ═══════════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const rawDt=Math.min(clock.getDelta(),.05);
  const dt=rawDt*timeScale;
  controls.update();

  // Timer
  if(state==='playing'&&timerActive){
    timer-=rawDt;
    document.getElementById('hud-timer').textContent=Math.max(0,Math.ceil(timer))+'s';
    if(timer<=0){
      timerActive=false;state='fail';playFail();
      document.getElementById('fail-remaining').textContent=(curLevelDef.target-actionsDone);
      showScreen('screen-fail');
    }
  }

  // Screen shake
  if(shakeAmt>.001){
    camera.position.x+=((Math.random()-.5)*shakeAmt);
    camera.position.y+=((Math.random()-.5)*shakeAmt);
    shakeAmt*=.85;
  }

  // Falling pieces
  for(const p of fallingPieces){
    if(p.settled)continue;p.vel.y-=9.81*dt;p.mesh.position.addScaledVector(p.vel,dt);
    p.mesh.rotation.x+=p.rotVel.x*dt;p.mesh.rotation.z+=p.rotVel.z*dt;
    if(p.mesh.position.y<.2){p.mesh.position.y=.2;p.vel.y=Math.abs(p.vel.y)*.25;
      p.vel.multiplyScalar(.4);p.rotVel.multiplyScalar(.4);
      if(Math.abs(p.vel.y)<.08){p.settled=true;p.vel.set(0,0,0)}}
  }

  // Physics
  for(const d of deformers)d.update(dt);
  for(const j of jellies)j.update();

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const ps=particles[i];ps.life-=dt*2.2;
    if(ps.life<=0){scene.remove(ps.pts);particles.splice(i,1);continue}
    ps.pts.material.opacity=ps.life;
    const pos=ps.pts.geometry.attributes.position;
    for(let j=0;j<ps.vels.length;j++){
      ps.vels[j].y-=6*dt;
      pos.setX(j,pos.getX(j)+ps.vels[j].x*dt);
      pos.setY(j,pos.getY(j)+ps.vels[j].y*dt);
      pos.setZ(j,pos.getZ(j)+ps.vels[j].z*dt);
    }
    pos.needsUpdate=true;
  }

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
updateStarDisplays();applyBg();showScreen('screen-title');animate();
</script>
</body>
</html>
